name: Tests

on:
  push:
    branches-ignore:
    - release-v**
    - rc-v**
    - beta-v**
    - alpha-v**
    - dev-v**
    paths-ignore:
    - "**.md"
    - "**.yaml"
    - "**.yml"

  pull_request:
    branches: [main]
    paths-ignore:
    - "**.md"
    - "**.yaml"
    - "**.yml"

concurrency: 
  group: ${{ github.ref_name }}-test
  cancel-in-progress: true

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: 'true'
          
      - name: Running Tests
        run: |
          go mod tidy
          make test