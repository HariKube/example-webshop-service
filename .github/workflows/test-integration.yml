name: Integration Tests

on:
  push:
    branches-ignore:
    - release-v**
    - rc-v**
    - beta-v**
    - alpha-v**
    - dev-v**
    paths-ignore:
    - "**.md"

  pull_request:
    branches: [main]
    paths-ignore:
    - "**.md"

concurrency: 
  group: ${{ github.ref_name }}-test-e2e
  cancel-in-progress: true

jobs:
  test-integration:
    strategy:
      matrix:
        kubeVersion: [ v1.34.0 ]
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: 'true'

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      
      - name: Running Test Integration
        run: devbox run make package test-integration
        env:
          TAG: snapshot
